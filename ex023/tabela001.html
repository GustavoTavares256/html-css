<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
            
        }

        td {
            border: 1px solid black;
            padding: 8px;
              text-align: center;
            vertical-align: middle;
        }

        .numero{
            text-align: right;
        }

        
    </style>
</head>
<body>
    <H1>Minha primeira tabela</H1>
    <!-- 
    HIERARQUIA DE TABELAS (SIMPLES)
    TABLE = TABELA
        TABLE ROW = LINHA DE TABELA
            TABLE HEADER = CABEÇALHO DA TABELA
            TABLE DATA = DADO DE TAV
     -->
    <table>
       <tr> <!-- Primeira linha -->
        <td>A1</td>
        <td>B1</td>
        <td class="numero">C1</td>
       </tr> 
       <tr>
        <td>A2</td>
        <td>B2</td>
        <td class="numero">C2</td>
       </tr>
       <tr>
        <td>A3</td>
        <td>B3</td>
        <td class="numero">C3</td>
       </tr>
       <tr>
        <td>A4</td>
        <td>B4</td>
        <td class=numero>C4</td>
       </tr>
       <tr >
        <td>A5</td>
        <td>B5</td>
        <td class=numero>C5</td>
       </tr>         
    </table>
    <h2><a href="tabela002.html" target="_blank">Clique aqui</a> pra ir para a tabela 2</h2>
</body>
</html>
