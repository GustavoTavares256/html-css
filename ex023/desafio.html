<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Tabelas</title>
    <style>
        body{
           font-family: Arial, Helvetica, sans-serif; 
        }

        table{
            width: 400px;
            height: 400px;
            border-collapse: collapse;
            
        }

        td{
            border: 1px solid black;
            padding: 2px;
              text-align: center;
            vertical-align: middle;
        }

    </style>
</head>
<body>
    <h1>Desafio Tabela com numeros</h1>
    <a href="tabela004.html">Ir para tabela 004</a>
    <table>
        <tr>
            <td colspan="3">1</td>
            <td rowspan="2">2</td>
        </tr>
        <tr>
            <td colspan="4">3</td>
            <td rowspan="4">4</td>
        </tr>
        <tr>
            <td>5</td>
            <td colspan="3">6</td>
        </tr>
        <tr>
            <td>7</td>
            <td rowspan="2">8</td>
        </tr>
        <tr>
            <td>9</td>
            <td colspan="2">10</td>
        
    </table>
</body>
</html>
