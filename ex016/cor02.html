<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* confguraçoes globais das CSS */
            height: 100%;
        }
       body{
        background-image: linear-gradient(to top,#3198E2 10%,
        #6D59C0,#B93590,#E33F5F,#FDD579 );
        background-attachment: fixed;
       }

    </style>
</head>
<body>
    <h1 style="font-family: Arial, Helvetica, sans-serif;">Testando Gradientes</h1>
    
</body>
</html>
