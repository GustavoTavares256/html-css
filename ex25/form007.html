<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            padding: 0px;
            margin: 0px;
        }

        input{
            border-radius: 80px;
            border: 5px;
            text-align: center;
        }
           ;     
        

    </style>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on"></form>

    <p>
        <label for="iesten">Estado</label>]
        <select name="estado" id="iest">
            <option value="" selected>--- Escolha---</option>
            <optgroup label="Região Sudeste">
                <option value="SP" selected>são Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="MG">Minas Gerais</option>
            </optgroup>

            <optgroup label="Região Nordeste">
                <option value="RN">Rio Grande do Norte</option>
                <option value="MA">Maranhão</option>
                <option value="PE">Pernambuco</option>
            </optgroup>
        </select>
    </p>

    <p>
        <label for="iprof">profissão</label>
        <input type="text" name="prof" id="iprof" list="lstprof">
        <datalist id="lstprof">
            <option value="ADM">Admininstradoe</option>
            <option value="CONT">Contador</option>
            <option value="PROF">Professor</option>
            <option value="DEV">Desenvolvedor web</option>
        </datalist>
    </p>

    <p>
        <label for="imsg">Mensagem</label><br>
        <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
    </p>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</body>
</html>
